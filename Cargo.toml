[workspace]
resolver = "2"
members = [
    "src-tauri",
    "crates/core",
    "crates/config",
    "crates/model-manager",
    "crates/runtime",
    "crates/candle-integration"
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.96"
authors = ["Preference"]
description = "Reimagine"


[workspace.dependencies]
tauri = { version = "2", features = [] }
tauri-build = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = "1"
glob-match = "0.2"
sha2 = "0.10"
