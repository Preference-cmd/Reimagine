name: ci-frontend

on:
  push:
    branches: [main, develop]
    paths:
      - 'ui/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'ui/**'
      - '.github/workflows/ci-frontend.yml'
  workflow_dispatch:

# Cancel superseded runs of this same workflow on the same ref.
concurrency:
  group: ci-frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # UI workspace: type-check + production build via bun.
  # `bun run build` already runs `tsc --noEmit && vite build`, so this covers
  # both the type-check and the production bundle.
  # ---------------------------------------------------------------------------
  ui:
    name: ui
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Get installed bun version
        id: bun-version
        run: echo "version=$(bun --version)" >> "$GITHUB_OUTPUT"

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: |
            ui/node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ steps.bun-version.outputs.version }}-${{ hashFiles('ui/bun.lock', 'ui/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ steps.bun-version.outputs.version }}-

      - name: Install dependencies (frozen lockfile)
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Type-check and build
        working-directory: ui
        run: bun run build