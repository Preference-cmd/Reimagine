name: ci-tauri

on:
  push:
    branches: [main, develop]
    paths:
      - 'crates/**'
      - 'src-tauri/**'
      - 'ui/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/ci-tauri.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'crates/**'
      - 'src-tauri/**'
      - 'ui/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/ci-tauri.yml'
  workflow_dispatch:
  merge_group:

concurrency:
  group: ci-tauri-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  quality:
    name: quality (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-24.04
          - platform: macos
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Tauri system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            wget

      - name: Setup Rust 1.96
        uses: dtolnay/rust-toolchain@1.96
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: .
          shared-key: tauri-${{ matrix.platform }}

      - name: Setup Bun
        if: matrix.platform == 'linux'
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Cache Bun global store
        if: matrix.platform == 'linux'
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('ui/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install frontend dependencies
        if: matrix.platform == 'linux'
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Type-check and build frontend
        if: matrix.platform == 'linux'
        working-directory: ui
        run: bun run build

      - name: Module layout scan
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          # These four pre-existing backend-worker-host modules are tracked
          # migration debt. Keep the gate useful by rejecting every other
          # mod.rs rather than making the workflow permanently red.
          if mod_rs=$(rg --files \
                --glob '**/mod.rs' \
                --glob '!**/target/**' \
                crates src-tauri | rg -v \
                '^crates/backend-worker-host/src/(catalog|install|inventory|package)/mod\.rs$'); then
            echo "::error title=mod.rs is not allowed::Use foo.rs + foo/ instead of mod.rs."
            echo "${mod_rs}" >&2
            exit 1
          fi

          if path_attr=$(rg -n --type rust \
                -e '^#\[path\s*=' \
                --glob '!**/target/**' \
                crates src-tauri); then
            echo "::error title=#[path] is not allowed::Use Cargo's standard module resolution."
            echo "${path_attr}" >&2
            exit 1
          fi

      - name: Rust format check
        if: matrix.platform == 'linux'
        run: cargo fmt --all -- --check

      - name: Rust check
        if: matrix.platform == 'linux'
        # ci-workers owns burn-worker compilation; exclude from generic check
        run: >
          cargo check
          --workspace --all-targets --locked
          --exclude reimagine-inference-burn-worker

      - name: Rust clippy
        if: matrix.platform == 'linux'
        run: >
          cargo clippy
          --workspace --all-targets --locked
          --exclude reimagine-inference-burn-worker
          -- -D warnings

      - name: Rust tests (non-Burn)
        # Worker tests have feature-specific boundaries and are owned by
        # ci-workers. Burn is tested separately with a runner-appropriate
        # backend so no-GPU Linux hosts never execute WGPU compute tests.
        run: >
          cargo test
          --workspace
          --exclude reimagine
          --exclude reimagine-inference-burn
          --exclude reimagine-inference-burn-worker
          --locked

      - name: Burn tests (Flex CPU)
        if: matrix.platform == 'linux'
        run: >
          cargo test
          -p reimagine-inference-burn
          --lib --locked
          --no-default-features --features flex

      - name: Burn tests (WGPU Metal)
        if: matrix.platform == 'macos'
        run: >
          cargo test
          -p reimagine-inference-burn
          --lib --locked

  compile:
    name: tauri-compile (${{ matrix.platform }})
    needs: quality
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-latest
          - platform: linux
            runner: ubuntu-24.04
          - platform: windows
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Tauri system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            wget

      - name: Setup Rust 1.96
        uses: dtolnay/rust-toolchain@1.96

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: .
          shared-key: tauri-${{ matrix.platform }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Cache Bun global store
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('ui/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Compile Tauri application
        uses: tauri-apps/tauri-action@v1
        with:
          args: --no-bundle
